<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

   
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <title>Formulario Productos</title>
</head>

<body>

    <section class="section">
        <div class="container">

            <h1 class="title has-text-centered">
                Registro de Productos
            </h1>

            
            <div class="field">
                <label class="label">Código Producto</label>
                <div class="control has-icons-left">
                    <input class="input" type="text"
                        placeholder="Ingrese código">
                    <span class="icon is-small is-left">
                        <i class="fas fa-barcode"></i>
                    </span>
                </div>
            </div>

          
            <div class="field">
                <label class="label">Nombre Producto</label>
                <div class="control has-icons-left">
                    <input class="input" type="text"
                        placeholder="Ingrese nombre">
                    <span class="icon is-small is-left">
                        <i class="fas fa-box"></i>
                    </span>
                </div>
            </div>

         
            <div class="field">
                <label class="label">Cantidad Producto</label>
                <div class="control has-icons-left">
                    <input class="input" type="number"
                        placeholder="Ingrese cantidad">
                    <span class="icon is-small is-left">
                        <i class="fas fa-sort-numeric-up"></i>
                    </span>
                </div>
            </div>

            
            <div class="field">
                <label class="label">Descripción Producto</label>
                <div class="control">
                    <textarea class="textarea"
                        placeholder="Ingrese descripción"></textarea>
                </div>
            </div>

            
            <div class="field">
                <label class="label">Marca Producto</label>
                <div class="control has-icons-left">
                    <input class="input" type="text"
                        placeholder="Ingrese marca">
                    <span class="icon is-small is-left">
                        <i class="fas fa-tag"></i>
                    </span>
                </div>
            </div>

           
            <div class="field">
                <label class="label">Valor Unitario</label>
                <div class="control has-icons-left">
                    <input class="input" type="number"
                        placeholder="Ingrese valor">
                    <span class="icon is-small is-left">
                        <i class="fas fa-dollar-sign"></i>
                    </span>
                </div>
            </div>

            
            <div class="field">
                <label class="label">Categoría</label>
                <div class="control">
                    <div class="select is-fullwidth">
                        <select>
                            <option>Seleccione categoría</option>
                            <option>Tecnología</option>
                            <option>Hogar</option>
                            <option>Ropa</option>
                            <option>Alimentos</option>
                        </select>
                    </div>
                </div>
            </div>

            
            <div class="field">
                <label class="label">Ubicación Producto</label>
                <div class="control has-icons-left">
                    <input class="input" type="text"
                        placeholder="Ingrese ubicación">
                    <span class="icon is-small is-left">
                        <i class="fas fa-location-dot"></i>
                    </span>
                </div>
            </div>

            
            <div class="field">
                <div class="control">
                    <button class="button is-link is-fullwidth">
                        Guardar Producto
                    </button>
                </div>
            </div>

        </div>
    </section>

</body>

</html>
